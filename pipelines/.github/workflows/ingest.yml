name: Ingest Synthetic Bars

on:
  workflow_dispatch:
  schedule:
    - cron: "7 * * * *"   # at minute 7 each hour (UTC)

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate CSV
        run: |
          python -m pip install --upgrade pip
          python pipelines/ingest_synthetic.py

      - name: Commit CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/bars/latest.csv
          git commit -m "Update synthetic bars" || echo "No changes to commit"
          git push
