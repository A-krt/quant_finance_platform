name: Ingest Synthetic Bars
on:
  workflow_dispatch:
  schedule:
    - cron: "7 * * * *"   # every hour at minute 7 (UTC)
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: python -m pip install --upgrade pip && pip install "great-expectations==1.15.1"
      - run: python pipelines/ingest_synthetic.py
      - run: python pipelines/validate_gx.py
      - name: Commit CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/bars/latest.csv
          git commit -m "Update synthetic bars" || echo "No changes to commit"
          git push
