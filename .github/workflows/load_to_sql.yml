name: Load CSV into Delta via SQL Warehouse

on:
  workflow_run:
    workflows: ["Ingest Synthetic Bars"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  load-to-sql:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo to get latest.csv
        uses: actions/checkout@v4

      - name: Install jq and Python deps
        run: |
          sudo apt-get update && sudo apt-get install -y jq python3-pip

          - name: Debug env vars (lengths only)
            env:
              HOST: ${{ secrets.DATABRICKS_HOST }}
              TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
              WAREHOUSE_ID: ${{ secrets.DATABRICKS_WAREHOUSE_ID }}
            run: |
              set -e
              echo "HOST length: ${#HOST}"
              echo "TOKEN length: ${#TOKEN}"
              echo "WAREHOUSE_ID: $WAREHOUSE_ID"

      # Quick sanity that HOST/TOKEN/WAREHOUSE_ID are all good
      - name: Smoke test Statement Execution (SELECT 1)
        env:
          HOST: ${{ secrets.DATABRICKS_HOST }}
          TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          WAREHOUSE_ID: ${{ secrets.DATABRICKS_WAREHOUSE_ID }}
        run: |
          set -euo pipefail
          payload='{"statement":"SELECT 1","warehouse_id":"'"$WAREHOUSE_ID"'","wait_timeout":"10s","on_wait_timeout":"CONTINUE"}'
          out=$(curl -sS -X POST "$HOST/api/2.0/sql/statements" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "$payload")
          echo "$out" | jq .

      - name: Generate SQL from CSV (staging -> integration)
        run: |
          python3 - << 'PY'
          import csv
          rows = []
          with open("data/bars/latest.csv", newline="") as f:
            r = csv.DictReader(f)
            for row in r:
              ts = row["ts"]
              o  = row["open"]; h = row["high"]; l = row["low"]; c = row["close"]; v = row["volume"]
              tup = f"(to_timestamp('{ts}','yyyy-MM-dd''T''HH:mm:ssXXX'),{o},{h},{l},{c},{v})"
              rows.append(tup)
          values = ",\n  ".join(rows)

          sql = f"""
          -- Match your workspace view: hive_metastore.quant_finance
          USE CATALOG hive_metastore;
          CREATE SCHEMA IF NOT EXISTS quant_finance;

          -- STAGING table: append-only with ingest_run_ts
          CREATE TABLE IF NOT EXISTS quant_finance.bars_1m_staging (
            ts TIMESTAMP,
            open DOUBLE,
            high DOUBLE,
            low  DOUBLE,
            close DOUBLE,
            volume DOUBLE,
            ingest_run_ts TIMESTAMP
          )
          USING DELTA;

          -- To replace staging each run instead of append, uncomment:
          -- TRUNCATE TABLE quant_finance.bars_1m_staging;

          INSERT INTO quant_finance.bars_1m_staging (ts, open, high, low, close, volume)
          VALUES
            {values}
          ;

          UPDATE quant_finance.bars_1m_staging
          SET ingest_run_ts = current_timestamp()
          WHERE ingest_run_ts IS NULL;

          -- INTEGRATION view: one row per ts (newest wins)
          CREATE OR REPLACE VIEW quant_finance.bars_1m_integration AS
          WITH ranked AS (
            SELECT *,
                   row_number() OVER (PARTITION BY ts ORDER BY ingest_run_ts DESC) rn
            FROM quant_finance.bars_1m_staging
          )
          SELECT ts, open, high, low, close, volume, ingest_run_ts
          FROM ranked WHERE rn = 1;
          """
          open("sql_to_run.sql","w").write(sql)
          PY

      - name: Execute SQL on the Serverless Warehouse (Statement Execution API)
        env:
          HOST: ${{ secrets.DATABRICKS_HOST }}
          TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          WAREHOUSE_ID: ${{ secrets.DATABRICKS_WAREHOUSE_ID }}
        run: |
          set -euo pipefail

          # Read the multi-statement SQL and split into individual statements
          mapfile -t statements < <(python3 << 'PY'
          with open("sql_to_run.sql") as f:
            content = f.read()
          # naive split by ';' - safe for our script (no semicolons inside string literals)
          stmts = [s.strip() for s in content.split(';') if s.strip()]
          for s in stmts:
            print(s)
          PY
          )

          echo "Found ${#statements[@]} statements to execute."

          # Function to submit and poll one statement
          run_stmt () {
            local stmt="$1"

            payload=$(jq -n --arg sql "$stmt" --arg wid "$WAREHOUSE_ID" \
              '{statement:$sql,
                warehouse_id:$wid,
                catalog:"hive_metastore",
                wait_timeout:"10s",
                on_wait_timeout:"CONTINUE"}')

            submit=$(curl -sS -w '\n%{http_code}' -X POST "$HOST/api/2.0/sql/statements" \
              -H "Authorization: Bearer '"$TOKEN"'" \
              -H "Content-Type: application/json" \
              -d "$payload")

            body=$(printf "%s" "$submit" | sed '$d')
            code=$(printf "%s" "$submit" | tail -n1)

            echo "::group::Submit response ($code)"
            echo "$body" | jq .
            echo "::endgroup::"

            if [ "$code" -ge 400 ]; then
              echo "POST /sql/statements failed (HTTP $code)"
              return 1
            fi

            # If it finished in the 10s window, we're done
            st=$(echo "$body" | jq -r '.status.state // empty')
            if [ "$st" = "SUCCEEDED" ]; then
              echo "Statement finished synchronously."
              return 0
            fi

            stmt_id=$(echo "$body" | jq -r '.statement_id // empty')
            if [ -z "$stmt_id" ]; then
              echo "No statement_id and no SUCCEEDED status in submit response. Aborting."
              return 1
            fi

            echo "Polling statement_id: $stmt_id"
            for i in $(seq 1 80); do
              resp=$(curl -sS -w '\n%{http_code}' -X GET "$HOST/api/2.0/sql/statements/$stmt_id" \
                -H "Authorization: Bearer $TOKEN")
              rbody=$(printf "%s" "$resp" | sed '$d')
              rcode=$(printf "%s" "$resp" | tail -n1)

              state=$(echo "$rbody" | jq -r '.status.state // empty')
              err=$(echo "$rbody" | jq -r '.error.message // empty')

              echo "Poll #$i: HTTP=$rcode state=${state:-<none>} err=${err:-<none>}"

              # Show payload if state missing (usually an error payload)
              if [ -z "${state:-}" ]; then
                echo "::group::Full GET payload"
                echo "$rbody" | jq .
                echo "::endgroup::"
              fi

              if [ "$state" = "SUCCEEDED" ]; then
                echo "Statement SUCCEEDED."
                return 0
              elif [ "$state" = "FAILED" ] || [ "$state" = "CANCELED" ] || [ "$rcode" -ge 400 ]; then
                echo "Statement failed or canceled."
                echo "$rbody" | jq .
                return 1
              fi
              sleep 2
            done

            echo "Timed out waiting for this statement"
            return 1
          }

          # Execute each statement sequentially
          for s in "${statements[@]}"; do
            echo "------ Executing SQL ------"
            echo "$s"
            echo "---------------------------"
            run_stmt "$s"
          done

          echo "All statements executed successfully"
