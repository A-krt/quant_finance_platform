name: Load CSV into Delta via SQL Warehouse

on:
  workflow_run:
    workflows: ["Ingest Synthetic Bars"]   # run after your ingest finishes
    types: [completed]
  workflow_dispatch:                        # allow manual runs too

permissions:
  contents: read

jobs:
  load-to-sql:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo to get latest.csv
        uses: actions/checkout@v4

      - name: Install jq + Databricks CLI
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
        shell: bash

      - name: Authenticate CLI
        env:
          HOST: ${{ secrets.DATABRICKS_HOST }}
          TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks auth login --host "$HOST" --token "$TOKEN"

      - name: Upload CSV to DBFS (overwrite same path)
        run: |
          databricks fs cp --overwrite data/bars/latest.csv dbfs:/FileStore/qf/latest.csv

      - name: Execute SQL on Serverless Warehouse (CREATE + COPY INTO + tag + views)
        env:
          HOST: ${{ secrets.DATABRICKS_HOST }}
          TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          WAREHOUSE_ID: ${{ secrets.DATABRICKS_WAREHOUSE_ID }}
        run: |
          set -euo pipefail

          read -r -d '' SQL <<'EOSQL'
          -- (optional) pick an explicit catalog to avoid ambiguity
          -- USE CATALOG main;

          -- 1) Ensure schema & table exist
          CREATE SCHEMA IF NOT EXISTS quant_finance;

          CREATE TABLE IF NOT EXISTS quant_finance.bars_1m (
            ts TIMESTAMP,
            open DOUBLE,
            high DOUBLE,
            low  DOUBLE,
            close DOUBLE,
            volume DOUBLE,
            ingest_run_ts TIMESTAMP
          )
          USING DELTA;

          -- 2) Re-load the same file each run
          COPY INTO quant_finance.bars_1m
          FROM 'dbfs:/FileStore/qf/latest.csv'
          FILEFORMAT = CSV
          FORMAT_OPTIONS ('header'='true')
          COPY_OPTIONS ('force'='true');

          -- 3) Tag newly ingested rows
          UPDATE quant_finance.bars_1m
          SET ingest_run_ts = current_timestamp()
          WHERE ingest_run_ts IS NULL;

          -- 4a) Active view (flags rows from the latest batch)
          CREATE OR REPLACE VIEW quant_finance.bars_1m_active AS
          SELECT
            t.*,
            CASE WHEN t.ingest_run_ts = (SELECT max(ingest_run_ts) FROM quant_finance.bars_1m)
                 THEN true ELSE false END AS is_active
          FROM quant_finance.bars_1m t;

          -- 4b) Silver view (dedupe per ts by newest batch)
          CREATE OR REPLACE VIEW quant_finance.bars_1m_silver AS
          WITH ranked AS (
            SELECT *, row_number() OVER (PARTITION BY ts ORDER BY ingest_run_ts DESC) rn
            FROM quant_finance.bars_1m
          )
          SELECT ts, open, high, low, close, volume, ingest_run_ts
          FROM ranked WHERE rn = 1;
          EOSQL

          # Submit statement to the SQL warehouse
          submit=$(jq -n --arg sql "$SQL" --arg wid "$WAREHOUSE_ID" \
            '{statement:$sql, warehouse_id:$wid}' |
            curl -sS -X POST "$HOST/api/2.0/sql/statements" \
              -H "Authorization: Bearer '"$TOKEN"'" \
              -H "Content-Type: application/json" \
              -d @-)

          echo "$submit" | tee submit.json
          stmt_id=$(jq -r '.statement_id' <<<"$submit")

          # Poll for completion
          for i in $(seq 1 60); do
            status=$(curl -sS -X GET "$HOST/api/2.0/sql/statements/$stmt_id" \
              -H "Authorization: Bearer $TOKEN")
            state=$(jq -r '.status.state' <<<"$status")
            echo "State: $state"
            if [ "$state" = "SUCCEEDED" ]; then
              echo "$status" | tee final.json
              exit 0
            elif [ "$state" = "FAILED" ] || [ "$state" = "CANCELED" ]; then
              echo "$status" | tee final.json
              echo "SQL failed."
              exit 1
            fi
            sleep 3
          done

          echo "Timed out waiting for SQL to finish."
          exit 1
